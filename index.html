<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loging page</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-sm border border-dashed border-blue-400 w-full max-w-md">
        <div class="text-center mb-8">
            <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GitHub Logo" class="w-16 mx-auto mb-4">
            <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" id="username" placeholder="Enter Username" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                <p class="text-xs text-indigo-600 mt-1">Default: admin</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password" placeholder="Enter Password" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                <p class="text-xs text-indigo-600 mt-1">Default: admin123</p>
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md font-semibold hover:bg-indigo-700 transition duration-200">
                Sign In
            </button>
        </form>

        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-gray-300"></span></div>
            <div class="relative flex justify-center text-sm"><span class="px-2 bg-white text-gray-500">OR</span></div>
        </div>

        <div class="bg-gray-50 p-4 rounded-md text-center border border-gray-100">
            <p class="text-xs text-gray-500 mb-2">Demo Credentials:</p>
            <p class="text-sm font-bold text-gray-700">Username: <span class="font-normal text-gray-600">admin</span></p>
            <p class="text-sm font-bold text-gray-700">Password: <span class="font-normal text-gray-600">admin123</span></p>
        </div>
    </div>

    <script src="./index.js"></script>
</body>
</html>

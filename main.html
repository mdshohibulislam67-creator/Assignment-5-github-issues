<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b px-6 md:px-10 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2 font-bold text-lg md:text-xl text-gray-800">
            <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" class="w-8" alt="Logo">
            <span>GitHub Issues Tracker</span>
        </div>
        <div class="flex gap-2">
            <div class="relative hidden md:block">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <input type="text" id="search-input" placeholder="Search issues..." class="border border-gray-200 rounded-md pl-10 pr-3 py-2 text-sm w-64 focus:outline-none focus:ring-1 focus:ring-indigo-500">
            </div>
            <button id="search-btn" class="bg-indigo-600 text-white px-4 md:px-6 py-2 rounded-md text-sm font-semibold hover:bg-indigo-700 transition">+ New Issue</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <div class="bg-white p-4 rounded-xl border border-gray-200 mb-6">
            <div class="flex gap-2 bg-gray-50 p-1 rounded-lg w-fit border border-gray-200">
                <button onclick="filterIssues('all')" id="tab-all" class="tab-btn px-6 md:px-8 py-2 rounded-md text-sm font-medium bg-indigo-600 text-white shadow-sm">All</button>
                <button onclick="filterIssues('open')" id="tab-open" class="tab-btn px-6 md:px-8 py-2 rounded-md text-sm font-medium text-gray-500 hover:bg-gray-100">Open</button>
                <button onclick="filterIssues('closed')" id="tab-closed" class="tab-btn px-6 md:px-8 py-2 rounded-md text-sm font-medium text-gray-500 hover:bg-gray-100">Closed</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-t-xl border border-gray-200 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-100 p-3 rounded-full text-indigo-600 hidden sm:block">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-gray-800" id="issue-count">0 Issues</h2>
                    <p class="text-sm text-gray-500">Track and manege your project issues</p>
                </div>
            </div>
            <div class="flex gap-4 text-xs font-bold uppercase tracking-wider">
                <span class="flex items-center gap-2"><span class="w-2.5 h-2.5 bg-green-500 rounded-full"></span> Open</span>
                <span class="flex items-center gap-2"><span class="w-2.5 h-2.5 bg-purple-400 rounded-full"></span> Closed</span>
            </div>
        </div>

        <div id="loading-spinner" class="hidden text-center py-20 italic text-gray-400 bg-white border-x border-b border-gray-200 rounded-b-xl shadow-sm">Loading issues...</div>
        <div id="all-issues" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 p-6 bg-white border-x border-b border-gray-200 rounded-b-xl shadow-sm">
            </div>
    </main>

    <div id="issue-modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center p-4 backdrop-blur-sm z-[100]">
        <div class="bg-white rounded-xl max-w-lg w-full p-8 relative shadow-2xl scale-up-animation">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-3xl font-light leading-none">&times;</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script src="./main.js"></script>
</body>
</html>
